<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Thoth — sacred ibis logo">
  <title>Thoth</title>
  <desc>Sacred ibis silhouette: round head, long down-curving beak (the iconic species marker), oval body, thin wading legs. Named for Thoth, ancient Egypt's ibis-headed god of writing and scribes.</desc>

  <!-- Soft papyrus disc -->
  <circle cx="80" cy="80" r="74" fill="#FAF7F0"/>
  <circle cx="80" cy="80" r="73" fill="none" stroke="#E6DCC0" stroke-width="1"/>

  <!-- Ibis, blue ink. Scaled and centered. -->
  <g transform="translate(24, 24) scale(3.5)" fill="#1E3A8A">
    <ellipse cx="11" cy="17" rx="6" ry="3.2"/>
    <path d="M 5 16 L 2 17 L 5 18 Z"/>
    <path d="M 14.5 14.5 C 16.5 12, 18 10, 19 8.5 L 20 9 C 19 11, 17.5 13.5, 15.5 16 Z"/>
    <circle cx="20.5" cy="8.5" r="2.4"/>
    <path d="M 22 10.5 C 24 13, 26 17, 28 21.5"
          stroke="#1E3A8A" stroke-width="1.7" fill="none" stroke-linecap="round"/>
    <circle cx="20.8" cy="7.8" r="0.55" fill="#FAF7F0"/>
    <line x1="9" y1="20" x2="8" y2="27" stroke="#1E3A8A" stroke-width="1.3" stroke-linecap="round"/>
    <line x1="12" y1="20" x2="13" y2="27" stroke="#1E3A8A" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
