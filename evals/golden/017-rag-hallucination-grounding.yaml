id: 017-rag-hallucination-grounding
question: How effective is retrieval-augmented generation (RAG) at reducing hallucination in large language models, and which architectural variants improve factual grounding on knowledge-intensive question answering?
picoc:
  population: Large language models applied to knowledge-intensive and open-domain question answering
  intervention: Retrieval-augmented generation (RAG) and its variants (self-reflective retrieval, adaptive retrieval, retrieval pre-training)
  comparison: Parametric-only LLMs without retrieval, and vanilla single-pass RAG
  outcome: Hallucination rate, factual accuracy / faithfulness, and QA exact-match
  context: Open-domain and knowledge-intensive NLP benchmarks, 2020-2024

# V2 OUTBOUND pipeline-SMOKE golden. Purpose: exercise the live outbound path
# (discoverer → fetcher → screener → assessor → drafter → critic → cite_check
# against real OpenAlex + arXiv) and verify it persists the per-call SearchQuery
# audit rows (M114) + provider-titled DiscoveredPaper rows (M118/M119). The
# synthetic `papers` block is schema-required scaffolding only — a pure-outbound
# run builds its own corpus and ignores the seeded paper, and run-evals.ts skips
# the seed-corpus-based v1 metrics (citation_recall/precision, coverage) for
# searchScope: outbound.
#
# NOT in the weekly cron smoke set — run manually via `workflow_dispatch:
# goldens=all`. `searchMaxHits` below caps discovery small so the FULL pipeline
# (screener → assessor → drafter → critic → cite_check) completes inside
# Mistral's free-tier budget — an uncapped ~50-paper run makes ~50+ sequential
# smart-tier calls and rate-limits out mid-run (see M126). To exercise a larger
# set on a paid / higher-RPS provider, set EVAL_SEARCH_MAX_HITS (e.g. 50).
# discovery_recall stays informational either way.
searchScope: outbound
searchProviders:
  - openalex
  - arxiv

# Free-tier-safe cap: few enough papers that the per-paper screener + assessor
# fan-out finishes within the free budget. EVAL_SEARCH_MAX_HITS overrides this.
searchMaxHits: 4

# INFORMATIONAL, not a calibrated gate. These five ids are on-topic reference
# papers (RAG hallucination / factual grounding / RAG evaluation), but exact-DOI
# discovery_recall against a live, LLM-driven discoverer is inherently NOISY: the
# discoverer's queries are LLM-generated and vary per run, so even these specific
# papers don't reliably surface (observed discovery_recall 0.2 then 0.0 across
# two back-to-back runs — see M126). Treat the resulting discovery_recall as an
# informational signal, NOT a regression baseline. They keep the metric wired so
# a manual run still reports it; the golden's real assertion is that the outbound
# pipeline runs and persists its audit rows.
expectedDois:
  - "10.18653/v1/2024.acl-long.585"     # RAGTruth: a hallucination corpus for RAG
  - "10.18653/v1/2023.emnlp-main.495"   # Active Retrieval Augmented Generation (FLARE)
  - "10.1609/aaai.v38i16.29728"         # Benchmarking LLMs in Retrieval-Augmented Generation
  - "10.18653/v1/2024.naacl-long.389"   # Adaptive-RAG
  - "10.18653/v1/2024.eacl-demo.16"     # RAGAs: automated evaluation of RAG

papers:
  - id: paper_001
    title: "Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks"
    summary: |
      A synthetic scaffold entry (not used by the outbound run, which builds
      its corpus from live discovery). Describes the canonical RAG architecture:
      a parametric seq2seq model combined with a non-parametric dense retriever
      over a Wikipedia index, trained end-to-end, improving factual grounding on
      open-domain QA versus a parametric-only baseline.
    markdown: |
      # Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks

      We introduce RAG, combining a pre-trained seq2seq generator with a dense
      passage retriever over a Wikipedia index. Conditioning generation on
      retrieved passages improves factual accuracy and reduces hallucination on
      open-domain question answering relative to a parametric-only baseline.

expectedPapers:
  - paper_001
expectedClaims:
  - retrieval augmentation reduces hallucination versus parametric-only generation

metadata:
  source: "Synthetic v2-outbound pipeline-smoke golden — discovery_recall is informational/noisy, not calibrated (see M126). Manual workflow_dispatch only."
  difficulty: medium
