id: 017-rag-hallucination-grounding
question: How effective is retrieval-augmented generation (RAG) at reducing hallucination in large language models, and which architectural variants improve factual grounding on knowledge-intensive question answering?
picoc:
  population: Large language models applied to knowledge-intensive and open-domain question answering
  intervention: Retrieval-augmented generation (RAG) and its variants (self-reflective retrieval, adaptive retrieval, retrieval pre-training)
  comparison: Parametric-only LLMs without retrieval, and vanilla single-pass RAG
  outcome: Hallucination rate, factual accuracy / faithfulness, and QA exact-match
  context: Open-domain and knowledge-intensive NLP benchmarks, 2020-2024

# V2 OUTBOUND pipeline-SMOKE golden. Purpose: exercise the live outbound path
# (discoverer → fetcher → screener → assessor → drafter → critic → cite_check
# against real OpenAlex + arXiv) and verify it persists the per-call SearchQuery
# audit rows (M114) + provider-titled DiscoveredPaper rows (M118/M119). The
# synthetic `papers` block is schema-required scaffolding only — a pure-outbound
# run builds its own corpus and ignores the seeded paper, and run-evals.ts skips
# the seed-corpus-based v1 metrics (citation_recall/precision, coverage) for
# searchScope: outbound.
#
# Outbound discovery golden. Run in the full sweep (workflow_dispatch
# goldens=all, or the dedicated outbound job) on a higher-RPS provider
# (LLM_PROVIDER=groq) — the 50-paper screener fan-out rate-limits on the Mistral
# free tier. discovery_recall is a REAL measured metric here (~0.6 with the fair
# budget + identity-agnostic matching below), not informational.
searchScope: outbound
searchProviders:
  - openalex
  - arxiv

# Discovery budget. 50 = the deploy ceiling (env.MAX_DISCOVERED_PAPERS_PER_RUN);
# a FAIR budget so target papers aren't cut by an over-tight top-N. The earlier
# cap of 4 forced discovery_recall≈0 regardless of the discoverer's real reach
# (M127). EVAL_SEARCH_MAX_HITS can override (e.g. lower for a quick free-tier smoke).
searchMaxHits: 50

# Five canonical RAG-hallucination / factual-grounding / RAG-evaluation papers a
# competent reviewer expects. Matching is identity-agnostic — DOI OR arXiv id OR
# exact title (see lib/eval/metrics.ts) — because the same paper is indexed under
# its DOI by OpenAlex and its arXiv id by arXiv; listing both makes
# discovery_recall robust to which provider surfaced it. With the fair budget the
# discoverer reliably surfaces ~3/5 (RAGTruth, RGB, RAGAs); FLARE and Adaptive-RAG
# stay hard for the LLM-generated queries and are kept here honestly so recall
# reflects the discoverer's real reach, not a curated-to-win subset.
expectedDiscovery:
  - { doi: "10.18653/v1/2024.acl-long.585",   arxivId: "2401.00396", title: "RAGTruth: A Hallucination Corpus for Developing Trustworthy Retrieval-Augmented Language Models" }
  - { doi: "10.18653/v1/2023.emnlp-main.495", arxivId: "2305.06983", title: "Active Retrieval Augmented Generation" }
  - { doi: "10.1609/aaai.v38i16.29728",       arxivId: "2309.01431", title: "Benchmarking Large Language Models in Retrieval-Augmented Generation" }
  - { doi: "10.18653/v1/2024.naacl-long.389", arxivId: "2403.14403", title: "Adaptive-RAG: Learning to Adapt Retrieval-Augmented Large Language Models through Question Complexity" }
  - { doi: "10.18653/v1/2024.eacl-demo.16",   arxivId: "2309.15217", title: "RAGAs: Automated Evaluation of Retrieval Augmented Generation" }

papers:
  - id: paper_001
    title: "Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks"
    summary: |
      A synthetic scaffold entry (not used by the outbound run, which builds
      its corpus from live discovery). Describes the canonical RAG architecture:
      a parametric seq2seq model combined with a non-parametric dense retriever
      over a Wikipedia index, trained end-to-end, improving factual grounding on
      open-domain QA versus a parametric-only baseline.
    markdown: |
      # Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks

      We introduce RAG, combining a pre-trained seq2seq generator with a dense
      passage retriever over a Wikipedia index. Conditioning generation on
      retrieved passages improves factual accuracy and reduces hallucination on
      open-domain question answering relative to a parametric-only baseline.

expectedPapers:
  - paper_001
expectedClaims:
  - retrieval augmentation reduces hallucination versus parametric-only generation

metadata:
  source: "v2-outbound discovery golden — discovery_recall measured with a fair searchMaxHits + identity-agnostic matching (DOI/arXiv/title, M127). Run in the full sweep on a higher-RPS provider."
  difficulty: medium
