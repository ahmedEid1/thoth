  - Chain-of-thought prompting substantially improves arithmetic and symbolic reasoning at scale
  - Self-consistency boosts CoT performance with a striking margin on hard benchmarks
  - Tree-of-Thoughts allows search and backtracking over reasoning, dramatically improving planning tasks
  - ReAct combining reasoning with action calls is more reliable than either alone on tool-use tasks
  - Zero-shot CoT via a single trigger phrase unlocks much of the CoT gain without exemplars
