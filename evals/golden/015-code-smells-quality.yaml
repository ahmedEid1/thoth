expectedClaims:
  - The impact of code smells on software quality is not uniform across smell types and attributes
  - Search-based and metric-based detection approaches dominate the code-smell tooling literature
  - Refactoring interventions produce measurable effects on quality attributes more significantly than smell identification alone
  - Code smells are predominantly introduced at file creation and rarely go away through targeted refactoring
