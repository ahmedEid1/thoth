  - Chain-of-verification with independent verification reduces hallucinations without external retrieval
  - Adaptive retrieval and self-reflection improve factuality beyond fixed-budget RAG
  - No single technique solves hallucination; the practical solution stacks retrieval, verification, and adaptive decoding
